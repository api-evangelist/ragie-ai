aid: ragie-ai
name: Ragie
review:
  question: Does Ragie expose a documented public WebSocket or SSE streaming API?
  answer: false
  date: '2026-06-20'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was created. Ragie's asynchronous surface is delivered
    entirely through outbound HTTP webhooks (provider-to-consumer POST callbacks
    with an X-Signature header), not through a client-consumable WebSocket
    (ws://, wss://) or HTTP Server-Sent Events (SSE) stream. Under the current
    API Evangelist scope, only SSE and WebSocket transports are modeled in
    AsyncAPI; one-directional outbound webhooks are documented in the OpenAPI/
    apis.yml surface and reviewed here instead.
findings:
  summary: |
    Ragie does not publish a documented public WebSocket or SSE streaming API.
    The Ragie platform exposes a REST (HTTPS) API under https://api.ragie.ai for
    document ingestion, retrievals, agentic responses, connections, entity
    extraction, and partitions. Asynchronous event notification is provided via
    outbound HTTP webhooks (e.g. document_status_updated, entity_extracted,
    connection_sync_finished), which are server-initiated callbacks to a
    consumer-hosted endpoint and not a client streaming transport. No realtime,
    bidirectional, or token-streaming WebSocket endpoint is documented.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.ragie.ai
      documented: true
    - protocol: Webhooks
      scheme: https
      note: Outbound provider-to-consumer HTTP POST callbacks signed with X-Signature; not a client streaming transport.
      documented: true
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming endpoint is documented in the Ragie API reference.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in Ragie's API reference, retrievals, responses, or connections pages as of the review date.

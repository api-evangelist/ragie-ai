sources:
  - url: https://docs.ragie.ai
    type: Documentation
    note: Overview and getting started; lists REST base URL https://api.ragie.ai; no WebSocket or SSE mentioned.
  - url: https://docs.ragie.ai/reference/retrieve
    type: APIReference
    note: Retrieve is POST /retrievals over HTTPS; no streaming transport.
  - url: https://docs.ragie.ai/docs/webhooks
    type: Documentation
    note: Asynchronous events are delivered via outbound HTTP webhooks signed with X-Signature, not a client streaming API.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE protocol surface exists. Ragie's only asynchronous
    mechanism is outbound HTTP webhooks, which fall outside the current
    AsyncAPI modeling scope, so no AsyncAPI document was authored. The REST
    surface is captured in openapi/ragie-ai-openapi.yml and apis.yml.

specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Ragie
providerId: ragie-ai
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- AI
- RAG
- Retrieval
- Vector Search
- Document Ingestion
- Plans
description: >-
  Ragie offers tiered subscription plans (Developer/Free, Starter, Pro, and
  Enterprise) that bundle a monthly allotment of processed pages and retrievals,
  then meter usage on top. Page processing overages are billed per page (Fast
  vs Hi-res), storage and search are billed per page per month, and audio/video
  processing is billed per minute. Overages draw down automatically from
  prepaid credits with a configurable monthly spending cap.
notes: >-
  Pricing reflects the published Ragie pricing page; verify current included
  allotments, per-page rates, and audio/video rates on the page during
  reconciliation.
sources:
- https://www.ragie.ai/pricing
- https://docs.ragie.ai
